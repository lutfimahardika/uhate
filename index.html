<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maintenance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Material Symbols Outlined" rel="stylesheet" />

<style>
/* === (SEMUA CSS TETAP, TIDAK DIUBAH) === */
:root{
--primary:#2563eb;
--primary-soft:#eff6ff;
--danger:#ef4444;
--warning:#f59e0b;
--success:#10b981;
--text:#0f172a;
--subtext:#64748b;
--bg:#f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);}
.header{background:white;padding:18px 28px;box-shadow:0 4px 20px rgba(0,0,0,0.04);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
.container{padding:25px;max-width:1300px;margin:auto;}
.card{background:white;padding:20px;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,0.05);transition:0.25s ease;border:1px solid #f1f5f9;}
.card:hover{transform:translateY(-4px);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px;}
label{font-size:13px;font-weight:500;color:#64748b;margin-bottom:5px;display:block;}
input,select,textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #e2e8f0;font-size:14px;}
button{border:none;cursor:pointer;border-radius:12px;padding:10px 15px;}
.btn-submit{background:var(--primary);color:white;width:100%;margin-top:20px;padding:14px;}
.card-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-top:20px;}
.badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;}
.proses{background:#e0f2fe;color:#0284c7}
.filling{background:#ecfdf5;color:#059669}
.packing{background:#fef3c7;color:#d97706}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;}
.modal.show{display:flex;}
.modal-content{background:white;padding:28px;border-radius:20px;width:90%;max-width:650px;}
.floating{position:fixed;bottom:30px;right:30px;background:var(--primary);color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;}
.area-group{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.area-btn{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:14px;padding:12px;text-align:center;cursor:pointer;}
.area-btn.active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);}
</style>
</head>

<body>

<div class="header">
<h2><i class="fa-solid fa-screwdriver-wrench"></i> Maintenance Dashboard</h2>
<div>Aktivitas Teknisi</div>
</div>

<div class="container">

<div class="card">
<div class="grid">

<div>
<label>Tanggal</label>
<input type="date" id="tanggal">
</div>

<div>
<label>Shift</label>
<select id="shift">
<option>Shift 1</option>
<option>Shift 2</option>
<option>Shift 3</option>
<option>Longshift 1</option>
<option>Longshift 2</option>
<option>S1</option>
<option>S2</option>
<option>S3</option>
</select>
</div>

<div>
<label>Teknisi</label>
<input type="text" id="teknisi">
</div>

</div>
</div>

<div id="activityTable" class="card-container"></div>
<button class="btn-submit" onclick="openPreview()">Submit Laporan</button>

</div>

<div class="floating" onclick="openForm()">+</div>

<!-- MODAL FORM -->
<div id="formModal" class="modal">
<div class="modal-content">

<h3>Aktivitas Baru</h3>

<label>Area</label>
<div class="area-group">
<div class="area-btn active" onclick="selectArea('Proses',this)">Proses</div>
<div class="area-btn" onclick="selectArea('Filling',this)">Filling</div>
<div class="area-btn" onclick="selectArea('Packing',this)">Packing</div>
</div>

<br>
<label>Mesin</label>
<select id="mesin"></select>

<br>
<label>Downtime</label>
<textarea id="downtime"></textarea>

<br>
<label>Action</label>
<textarea id="action"></textarea>

<button class="btn-submit" onclick="saveActivity()">Simpan</button>

</div>
</div>

<!-- PREVIEW -->
<div id="previewModal" class="modal">
<div class="modal-content">
<h3>Laporan WhatsApp</h3>
<textarea id="hasil" style="height:300px"></textarea>
<br>
<button onclick="copyText()">Copy</button>
<button onclick="publish()">Publish</button>
<button onclick="closePreview()">Tutup</button>
</div>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbxvvEwX-6UPRxU0sd5_U1pyvVVVKyVgz2x-qPvii92ZXNiEiyy_PczSqNAqWaaAIGfD/exec"

let activities=[]
let editIndex=null
let selectedArea="Proses"

const formModal=document.getElementById("formModal")
const previewModal=document.getElementById("previewModal")
const activityTable=document.getElementById("activityTable")

/* =========================
   ✅ HEADER LOCAL STORAGE
========================= */

function saveHeader(){
  const header={
    tanggal:tanggal.value,
    shift:shift.value,
    teknisi:teknisi.value
  }
  localStorage.setItem("header",JSON.stringify(header))
}

function loadHeader(){
  const data=localStorage.getItem("header")
  if(data){
    const h=JSON.parse(data)
    tanggal.value=h.tanggal||""
    shift.value=h.shift||"Shift 1"
    teknisi.value=h.teknisi||""
  }
}

/* AUTO SAVE */
tanggal.addEventListener("change",saveHeader)
shift.addEventListener("change",saveHeader)
teknisi.addEventListener("input",saveHeader)

/* ========================= */

function openForm(){formModal.classList.add("show");updateMesin()}
function closeForm(){formModal.classList.remove("show")}
function openPreview(){generateReport();previewModal.classList.add("show")}
function closePreview(){previewModal.classList.remove("show")}

function selectArea(area,el){
selectedArea=area
document.querySelectorAll(".area-btn").forEach(b=>b.classList.remove("active"))
el.classList.add("active")
updateMesin()
}

function updateMesin(){
const mesinEl=document.getElementById("mesin")
let list=[]

if(selectedArea==="Proses") list=["Sterilizer","Aseptic Tank","Mixing Tank 1"]
if(selectedArea==="Filling") list=["Combibloc 1","Combibloc 2","Combibloc 3","Tetra A3 Flex"]
if(selectedArea==="Packing") list=["Traypacker 1","Straw App 1","Buffer Table 1"]

mesinEl.innerHTML=""
list.forEach(m=>{
const opt=document.createElement("option")
opt.value=m
opt.textContent=m
mesinEl.appendChild(opt)
})
}

function saveActivity(){
const data={area:selectedArea,mesin:mesin.value,downtime:downtime.value,action:action.value}
if(editIndex==null){activities.push(data)}else{activities[editIndex]=data;editIndex=null}
saveToLocal()
renderTable()
closeForm()
}

function renderTable(){
activityTable.innerHTML=""
activities.forEach((a,i)=>{
activityTable.innerHTML+=`<div class="card">${a.area} - ${a.mesin}</div>`
})
}

function generateReport(){
const date=new Date(tanggal.value)
const hari=date.toLocaleDateString('id-ID',{weekday:'long'})
const tgl=date.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})
let text=`${hari}, ${tgl}, ${shift.value}\n`
hasil.value=text
}

function copyText(){hasil.select();document.execCommand("copy")}
async function publish(){
await fetch(scriptURL,{method:"POST",body:JSON.stringify(activities)})
resetData()
closePreview()
}

/* RESET */
function resetData(){
activities=[]
localStorage.removeItem("activities")
localStorage.removeItem("header") /* ✅ penting */
renderTable()
}

/* STORAGE */
function saveToLocal(){localStorage.setItem("activities",JSON.stringify(activities))}
function loadFromLocal(){
const data=localStorage.getItem("activities")
if(data){activities=JSON.parse(data);renderTable()}
}

/* INIT */
loadFromLocal()
loadHeader()

</script>

</body>
</html>
