<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maintenance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Material Symbols Outlined" rel="stylesheet" />

<style>

:root{
--primary:#2563eb;
--primary-soft:#eff6ff;
--danger:#ef4444;
--warning:#f59e0b;
--success:#10b981;
--text:#0f172a;
--subtext:#64748b;
--bg:#f8fafc;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* HEADER */

.header{
background:white;
padding:18px 28px;
box-shadow:0 4px 20px rgba(0,0,0,0.04);
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:50;
}

.header h2{
font-size:20px;
font-weight:600;
}

.container{
padding:25px;
max-width:1300px;
margin:auto;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 30px rgba(0,0,0,0.05);
transition:0.25s ease;
border:1px solid #f1f5f9;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

/* FORM */

label{
font-size:13px;
font-weight:500;
color:#64748b;
margin-bottom:5px;
display:block;
}

input,select,textarea{
width:100%;
padding:12px 14px;
border-radius:12px;
border:1px solid #e2e8f0;
font-size:14px;
transition:0.2s;
}

input:focus,
select:focus,
textarea:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 3px var(--primary-soft);
}

/* BUTTON */

button{
border:none;
cursor:pointer;
border-radius:12px;
padding:10px 15px;
font-weight:500;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
}

.btn-add{
background:var(--primary);
color:white;
}

.btn-submit{
background:var(--primary);
color:white;
width:100%;
margin-top:20px;
padding:14px;
font-size:15px;
}

.btn-back{
background:#94a3b8;
color:white;
}

.btn-copy{
background:var(--success);
color:white;
}

/* CARD LIST */

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:18px;
margin-top:20px;
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.badge{
padding:6px 14px;
border-radius:20px;
font-size:12px;
font-weight:600;
display:inline-block;
}

.proses{background:#e0f2fe;color:#0284c7}
.filling{background:#ecfdf5;color:#059669}
.packing{background:#fef3c7;color:#d97706}

/* NEW CARD CONTENT */

.card-section{
margin-top:10px;
}

.card-label{
font-size:12px;
font-weight:600;
color:#64748b;
margin-bottom:4px;
}

.card-text{
font-size:14px;
}

.card-divider{
border-top:1px solid #e2e8f0;
margin:12px 0;
}

/* ICON BUTTON */

.icon-btn{
background:#f1f5f9;
border:none;
cursor:pointer;
font-size:14px;
margin-left:6px;
padding:6px 8px;
border-radius:8px;
}

.icon-edit{color:#f59e0b}
.icon-delete{color:#ef4444}

.icon-btn:hover{
background:#e2e8f0;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:100;
}

.modal.show{
display:flex;
}

.modal-content{
background:white;
padding:28px;
border-radius:20px;
width:90%;
max-width:650px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
position:relative;
}

/* CLOSE BUTTON */

.modal-close{
position:absolute;
top:12px;
right:12px;
background:#f1f5f9;
border:none;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.modal-close:hover{
background:#e2e8f0;
}

/* FLOATING */

.floating{
position:fixed;
bottom:30px;
right:30px;
background:var(--primary);
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 10px 30px rgba(37,99,235,0.4);
cursor:pointer;
transition:0.25s;
}

.floating:hover{
transform:scale(1.08);
}

/* AREA */

.area-group{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:10px;
}

.area-btn{
background:#f1f5f9;
border:1px solid #e2e8f0;
border-radius:14px;
padding:12px;
text-align:center;
cursor:pointer;
transition:0.2s;
font-size:14px;
font-weight:500;
}

.area-btn:hover{
background:#e2e8f0;
}

.area-btn.active{
background:var(--primary-soft);
border-color:var(--primary);
color:var(--primary);
}

.area-icon{
display:block;
font-size:26px;
margin-bottom:5px;
}

</style>

</head>

<body>

<div class="header">
<h2>
<i class="fa-solid fa-screwdriver-wrench"></i>
Maintenance Dashboard
</h2>
<div>Aktivitas Teknisi</div>
</div>

<div class="container">

<div class="card">

<div class="grid">

<div>
<label>Tanggal</label>
<input type="date" id="tanggal">
</div>

<div>
<label>Shift</label>
<select id="shift">
<option>Shift 1</option>
<option>Shift 2</option>
<option>Shift 3</option>
<option>Longshift 1</option>
<option>Longshift 2</option>
<option>S1</option>
<option>S2</option>
<option>S3</option>
</select>
</div>

<div>
<label>Teknisi</label>
<input type="text" id="teknisi">
</div>

</div>

</div>

<div id="activityTable" class="card-container"></div>

<button class="btn-submit" onclick="openPreview()">Submit Laporan</button>

</div>

<div class="floating" onclick="openForm()">
<i class="fa-solid fa-plus"></i>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
<div class="modal-content">

<button class="modal-close" onclick="closeForm()">
<i class="fa-solid fa-xmark"></i>
</button>

<h3>Aktivitas Baru</h3>

<br>

<label>Area</label>

<div class="area-group">
  <div class="area-btn active" onclick="selectArea('Proses', this)">
    <span class="material-symbols-outlined area-icon">local_fire_department</span>
    Proses
  </div>

  <div class="area-btn" onclick="selectArea('Filling', this)">
    <span class="material-symbols-outlined area-icon">water_drop</span>
    Filling
  </div>

  <div class="area-btn" onclick="selectArea('Packing', this)">
    <span class="material-symbols-outlined area-icon">inventory_2</span>
    Packing
  </div>
</div>

<br><br>

<label>Mesin</label>
<select id="mesin"></select>

<br><br>

<label>Downtime</label>
<textarea id="downtime"></textarea>

<br><br>

<label>Action</label>
<textarea id="action"></textarea>

<br><br>

<button class="btn-submit" onclick="saveActivity()">Simpan</button>

</div>
</div>

<!-- PREVIEW -->
<div id="previewModal" class="modal">
<div class="modal-content">

<h3>Laporan WhatsApp</h3>

<br>

<textarea id="hasil" style="height:300px"></textarea>

<br><br>

<button class="btn-copy" onclick="copyText()">Copy</button>
<button class="btn-add" onclick="publish()">Publish</button>
<button class="btn-back" onclick="closePreview()">Tutup</button>

</div>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbxvvEwX-6UPRxU0sd5_U1pyvVVVKyVgz2x-qPvii92ZXNiEiyy_PczSqNAqWaaAIGfD/exec"

let activities=[]
let editIndex=null
let selectedArea = "Proses"

const formModal=document.getElementById("formModal")
const previewModal=document.getElementById("previewModal")
const activityTable=document.getElementById("activityTable")

/* =========================
   HEADER LOCAL STORAGE
========================= */

function saveHeader(){
  const headerData = {
    tanggal: document.getElementById("tanggal").value,
    shift: document.getElementById("shift").value,
    teknisi: document.getElementById("teknisi").value
  }
  localStorage.setItem("headerData", JSON.stringify(headerData))
}

function loadHeader(){
  const data = localStorage.getItem("headerData")
  if(data){
    const h = JSON.parse(data)
    document.getElementById("tanggal").value = h.tanggal || ""
    document.getElementById("shift").value = h.shift || "Shift 1"
    document.getElementById("teknisi").value = h.teknisi || ""
  }
}

/* =========================
   EVENT LISTENER HEADER
========================= */

document.getElementById("tanggal").addEventListener("change", saveHeader)
document.getElementById("shift").addEventListener("change", saveHeader)
document.getElementById("teknisi").addEventListener("input", saveHeader)

/* =========================
   MODAL
========================= */

function openForm(){
  formModal.classList.add("show")
  updateMesin()
}

function closeForm(){
  formModal.classList.remove("show");
  clearForm(); 
  selectedArea = "Proses"

  document.querySelectorAll(".area-btn")
    .forEach(btn=>btn.classList.remove("active"))

  document.querySelector(".area-btn").classList.add("active")

  updateMesin()
}

function openPreview(){
  generateReport()
  previewModal.classList.add("show")
}

function closePreview(){
  previewModal.classList.remove("show")
}

/* =========================
   AREA
========================= */

function selectArea(area, el){
  selectedArea = area

  document.querySelectorAll(".area-btn")
    .forEach(btn => btn.classList.remove("active"))

  el.classList.add("active")

  updateMesin()
}

function updateMesin(){
  const area = selectedArea
  const mesin = document.getElementById("mesin")

  let list = []

  if(area === "Proses"){
    list = ["Sterilizer","Aseptic Tank","Mixing Tank 1"]
  }
  else if(area === "Filling"){
    list = ["Combibloc 1","Combibloc 2","Combibloc 3","Tetra A3 Flex"]
  }
  else if(area === "Packing"){
    list = ["Traypacker 1","Straw App 1","Buffer Table 1"]
  }

  mesin.innerHTML = ""

  list.forEach(item=>{
    const option = document.createElement("option")
    option.value = item
    option.textContent = item
    mesin.appendChild(option)
  })
}

/* =========================
   ACTIVITY
========================= */

function saveActivity(){
  const data={
    area:selectedArea,
    mesin:mesin.value,
    downtime:downtime.value,
    action:action.value
  }

  if(editIndex==null){
    activities.push(data)
  }else{
    activities[editIndex]=data
    editIndex=null
  }

  saveToLocal()
  renderTable()
  closeForm()
}

function renderTable(){
  activityTable.innerHTML=""

  activities.forEach((a,i)=>{
    let badgeClass=""
    if(a.area=="Proses") badgeClass="proses"
    if(a.area=="Filling") badgeClass="filling"
    if(a.area=="Packing") badgeClass="packing"

    const actionNumbered = a.action
      .split("\n")
      .filter(line => line.trim() !== "")
      .map((line,i)=>`${i+1}. ${line}`)
      .join("<br>")

    activityTable.innerHTML+=`
    <div class="card">

      <div class="card-header">
        <div class="badge ${badgeClass}">
          ${a.area} •> ${a.mesin}
        </div>

        <div>
          <button class="icon-btn icon-edit" onclick="edit(${i})">
            <i class="fa-solid fa-pen"></i>
          </button>
          <button class="icon-btn icon-delete" onclick="hapus(${i})">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
      </div>

      <div class="card-section">
        <div class="card-label">Downtime</div>
        <div class="card-text">${a.downtime}</div>
      </div>

      <div class="card-divider"></div>

      <div class="card-section">
        <div class="card-label">Action</div>
        <div class="card-text">${actionNumbered}</div>
      </div>

    </div>`
  })
}

function edit(i){
  const data = activities[i]
  editIndex = i

  selectedArea = data.area

  document.querySelectorAll(".area-btn")
    .forEach(btn=>{
      btn.classList.remove("active")
      if(btn.innerText.includes(selectedArea)){
        btn.classList.add("active")
      }
    })

  updateMesin()

  document.getElementById("mesin").value = data.mesin
  document.getElementById("downtime").value = data.downtime
  document.getElementById("action").value = data.action

  formModal.classList.add("show")
}

function hapus(i){
  activities.splice(i,1)
  saveToLocal()
  renderTable()
}

/* =========================
   REPORT
========================= */

function generateReport(){
  const tanggal=document.getElementById("tanggal").value
  const date=new Date(tanggal)

  const hari=date.toLocaleDateString('id-ID',{weekday:'long'})
  const tgl = date.toLocaleDateString('id-ID',{
    day:'2-digit',
    month:'long',
    year:'numeric'
  })

  const shift=document.getElementById("shift").value

  let text=`${hari}, ${tgl}, ${shift}\n`

  const grouped={}

  activities.forEach(a=>{
    if(!grouped[a.area]) grouped[a.area]={}
    if(!grouped[a.area][a.mesin]) grouped[a.area][a.mesin]=[]
    grouped[a.area][a.mesin].push(a)
  })

  for(let area in grouped){
    text+=`\n*${area}*\n`
    for(let mesin in grouped[area]){
      text+=`*• ${mesin}*\n`
      grouped[area][mesin].forEach(d=>{
        text+=`> ${d.downtime}\n`
        d.action.split("\n").forEach(a=>{
          text+=`- ${a}\n`
        })
      })
    }
  }

  hasil.value=text
}

function copyText(){
  hasil.select()
  document.execCommand("copy")
  alert("Copied")
}

/* =========================
   PUBLISH
========================= */

async function publish(){
  const tanggal=document.getElementById("tanggal").value
  const shift=document.getElementById("shift").value
  const teknisi=document.getElementById("teknisi").value

  const data=activities.map(a=>({
    tanggal,shift,teknisi,
    area:a.area,
    mesin:a.mesin,
    downtime:a.downtime,
    action:a.action
  }))

  try{
    await fetch(scriptURL,{method:"POST",body:JSON.stringify(data)})
    resetData()
    closePreview()
    alert("Berhasil Publish")
  }catch{
    alert("Gagal Publish")
  }
}

/* =========================
   STORAGE
========================= */

function resetData(){
  activities=[]
  localStorage.removeItem("activities")
  renderTable()
}

function saveToLocal(){
  localStorage.setItem("activities", JSON.stringify(activities))
  saveHeader() // 🔥 penting: ikut simpan header
}

function loadFromLocal(){
  const data=localStorage.getItem("activities")
  if(data){
    activities=JSON.parse(data)
    renderTable()
  }
}

function clearForm(){
  mesin.value=""
  downtime.value=""
  action.value=""
}

/* =========================
   INIT
========================= */

loadHeader()
loadFromLocal()

</script>

</body>
</html>
