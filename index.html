<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maintenance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--primary:#2563eb;
--primary-soft:#eff6ff;
--danger:#ef4444;
--warning:#f59e0b;
--success:#10b981;
--text:#0f172a;
--subtext:#64748b;
--bg:#f8fafc;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* HEADER */

.header{
background:white;
padding:18px 28px;
box-shadow:0 4px 20px rgba(0,0,0,0.04);
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:50;
}

.container{
padding:25px;
max-width:1300px;
margin:auto;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 30px rgba(0,0,0,0.05);
border:1px solid #f1f5f9;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

/* FORM */

label{
font-size:13px;
font-weight:500;
color:#64748b;
margin-bottom:5px;
display:block;
}

input,select,textarea{
width:100%;
padding:12px 14px;
border-radius:12px;
border:1px solid #e2e8f0;
font-size:14px;
}

/* BUTTON */

button{
border:none;
cursor:pointer;
border-radius:12px;
padding:10px 15px;
font-weight:500;
}

.btn-add{background:var(--primary);color:white;}
.btn-submit{background:var(--primary);color:white;width:100%;margin-top:20px;padding:14px;}
.btn-back{background:#94a3b8;color:white;}
.btn-copy{background:var(--success);color:white;}

/* AREA BUTTON */

.area-group{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:10px;
}

.area-btn{
background:#f1f5f9;
border:1px solid #e2e8f0;
border-radius:14px;
padding:12px;
text-align:center;
cursor:pointer;
transition:0.2s;
font-size:14px;
}

.area-icon{
display:block;
font-size:26px;
margin-bottom:5px;
}

/* ACTIVE COLORS */

.area-btn.proses.active{
background:#e0f2fe;
border-color:#0284c7;
color:#0284c7;
}

.area-btn.filling.active{
background:#ecfdf5;
border-color:#059669;
color:#059669;
}

.area-btn.packing.active{
background:#fef3c7;
border-color:#d97706;
color:#d97706;
}

/* CARD LIST */

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:18px;
margin-top:20px;
}

.badge{
padding:6px 14px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.proses{background:#e0f2fe;color:#0284c7}
.filling{background:#ecfdf5;color:#059669}
.packing{background:#fef3c7;color:#d97706}

.card-divider{
border-top:1px solid #e2e8f0;
margin:12px 0;
}

/* MODAL */

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal.show{display:flex;}

.modal-content{
background:white;
padding:28px;
border-radius:20px;
width:90%;
max-width:650px;
}

/* FLOAT */

.floating{
position:fixed;
bottom:30px;
right:30px;
background:var(--primary);
color:white;
width:60px;height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h2><i class="fa-solid fa-screwdriver-wrench"></i> Maintenance Dashboard</h2>
<div>Aktivitas Teknisi</div>
</div>

<div class="container">

<div class="card">
<div class="grid">

<div>
<label>Tanggal</label>
<input type="date" id="tanggal">
</div>

<div>
<label>Shift</label>
<select id="shift">
<option>Shift 1</option>
<option>Shift 2</option>
<option>Shift 3</option>
</select>
</div>

<div>
<label>Teknisi</label>
<input type="text" id="teknisi">
</div>

</div>
</div>

<div id="activityTable" class="card-container"></div>

<button class="btn-submit" onclick="openPreview()">Submit Laporan</button>

</div>

<div class="floating" onclick="openForm()">
<i class="fa-solid fa-plus"></i>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
<div class="modal-content">

<h3>Aktivitas Baru</h3>

<label>Area</label>
<div class="area-group">

<div class="area-btn proses active" onclick="selectArea('Proses', this)">
<span class="material-symbols-outlined area-icon">local_fire_department</span>
Proses
</div>

<div class="area-btn filling" onclick="selectArea('Filling', this)">
<span class="material-symbols-outlined area-icon">water_drop</span>
Filling
</div>

<div class="area-btn packing" onclick="selectArea('Packing', this)">
<span class="material-symbols-outlined area-icon">inventory_2</span>
Packing
</div>

</div>

<br>

<label>Mesin</label>
<select id="mesin"></select>

<br><br>

<label>Downtime</label>
<textarea id="downtime"></textarea>

<br><br>

<label>Action</label>
<textarea id="action"></textarea>

<br><br>

<button class="btn-add" onclick="saveActivity()">Simpan</button>
<button class="btn-back" onclick="closeForm()">Tutup</button>

</div>
</div>

<!-- PREVIEW -->
<div id="previewModal" class="modal">
<div class="modal-content">

<h3>Laporan WhatsApp</h3>

<textarea id="hasil" style="height:300px"></textarea>

<br><br>

<button class="btn-copy" onclick="copyText()">Copy</button>
<button class="btn-add" onclick="publish()">Publish</button>
<button class="btn-back" onclick="closePreview()">Tutup</button>

</div>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbxvvEwX-6UPRxU0sd5_U1pyvVVVKyVgz2x-qPvii92ZXNiEiyy_PczSqNAqWaaAIGfD/exec"

let activities=[]
let editIndex=null
let selectedArea="Proses"

const formModal=document.getElementById("formModal")
const previewModal=document.getElementById("previewModal")
const activityTable=document.getElementById("activityTable")

function openForm(){
formModal.classList.add("show")
updateMesin()
}

function closeForm(){
formModal.classList.remove("show")
clearForm()
}

function selectArea(area,el){
selectedArea=area

document.querySelectorAll(".area-btn").forEach(btn=>btn.classList.remove("active"))
el.classList.add("active")

updateMesin()
}

function updateMesin(){
const mesin=document.getElementById("mesin")
let list=[]

if(selectedArea==="Proses"){
list=["Sterilizer","Aseptic Tank","Mixing Tank 1"]
}else if(selectedArea==="Filling"){
list=["Combibloc 1","Combibloc 2","Combibloc 3","Tetra A3 Flex"]
}else{
list=["Traypacker 1","Straw App 1","Buffer Table 1"]
}

mesin.innerHTML=""
list.forEach(item=>{
const option=document.createElement("option")
option.value=item
option.textContent=item
mesin.appendChild(option)
})
}

function saveActivity(){
const data={
area:selectedArea,
mesin:mesin.value,
downtime:downtime.value,
action:action.value
}

if(editIndex==null){activities.push(data)}
else{activities[editIndex]=data;editIndex=null}

renderTable()
closeForm()
}

function renderTable(){
activityTable.innerHTML=""
activities.forEach((a,i)=>{

let badgeClass=a.area.toLowerCase()

const actionNumbered=a.action.split("\n").map((l,i)=>`${i+1}. ${l}`).join("<br>")

activityTable.innerHTML+=`
<div class="card">

<div class="badge ${badgeClass}">
${a.area} •> ${a.mesin}
</div>

<div>Downtime: ${a.downtime}</div>

<div class="card-divider"></div>

<div>${actionNumbered}</div>

</div>`
})
}

function clearForm(){
selectedArea="Proses"

document.querySelectorAll(".area-btn").forEach(btn=>btn.classList.remove("active"))
document.querySelector(".area-btn.proses").classList.add("active")

downtime.value=""
action.value=""

updateMesin()
}

</script>

</body>
</html>
